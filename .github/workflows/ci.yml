name: AntiPrice AI CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: './antiprice-ai/backend/package-lock.json'
        
    - name: Install dependencies
      run: |
        cd antiprice-ai/backend
        npm ci
        
    - name: Generate Prisma Client
      run: |
        cd antiprice-ai/backend
        npx prisma generate --schema=prisma/schema.prisma
        
    - name: Run Lint
      run: |
        cd antiprice-ai/backend
        npm run lint
        
    - name: Run Tests
      run: |
        cd antiprice-ai/backend
        npm run test
        
    - name: Build Backend
      run: |
        cd antiprice-ai/backend
        npm run build

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: './antiprice-ai/frontend/package-lock.json'
        
    - name: Install dependencies
      run: |
        cd antiprice-ai/frontend
        npm ci
        
    - name: Build Frontend
      run: |
        cd antiprice-ai/frontend
        npm run build
